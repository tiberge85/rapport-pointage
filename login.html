<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WannyGest - Connexion</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0d3b36 0%,#1a7a6d 50%,#0d3b36 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:400px;max-width:90%;overflow:hidden}
        .login-header{background:linear-gradient(135deg,#1a7a6d,#0d6b5e);padding:28px;text-align:center;color:#fff}
        .login-header img{height:60px;margin-bottom:10px}
        .login-header h2{font-size:18px}
        .login-header p{font-size:13px;opacity:0.7;margin-top:4px}
        .login-body{padding:28px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
        .form-group input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px}
        .form-group input:focus{outline:none;border-color:#1a7a6d;box-shadow:0 0 0 3px rgba(26,122,109,0.1)}
        .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#e8672a,#d45a20);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s}
        .btn-login:hover{background:linear-gradient(135deg,#d45a20,#c04e15);transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,103,42,0.4)}
        .links{text-align:center;margin-top:16px;font-size:13px}
        .links a{color:#1a7a6d;text-decoration:none;font-weight:600}
        .links a:hover{text-decoration:underline}
        .flash{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px}
        .flash.error{background:#fde8e8;color:#c53030}
        .flash.success{background:#e8f5f2;color:#1a7a6d}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="/static/logo_wannygest.png" alt="RAMYA" onerror="this.style.display='none'">
            <h2>Connexion</h2>
            <p>Accédez à votre espace de travail</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
            {% endfor %}{% endif %}{% endwith %}
            
            <form method="post" action="/login">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" name="username" required autofocus placeholder="Votre identifiant">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" required placeholder="Votre mot de passe">
                </div>
                <button type="submit" class="btn-login">🔐 Se connecter</button>
            </form>
<div style="text-align:center;margin-top:14px;border-top:1px solid #eee;padding-top:12px"><a href="/portail" style="color:#1A7A6D;font-size:12px;font-weight:600">👤 Espace Client → Se connecter ou créer un compte</a></div>
            <div class="links">
                <a href="/">Retour à l'accueil</a>
            </div>
        </div>
    </div>
</body>
</html>
