{% extends "base.html" %}
{% block title %}WannyGest - Ajouter employé{% endblock %}
{% block content %}
<div class="page-header"><h1>➕ Nouvel employé</h1></div>
<div class="card" style="max-width:750px"><div class="card-body"><form method="post" enctype="multipart/form-data">
    <div style="display:flex;gap:16px;margin-bottom:16px">
        <div style="flex:0 0 100px;text-align:center">
            <div style="width:80px;height:80px;border-radius:50%;background:#e0e0e0;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#999">👤</div>
            <label style="font-size:11px;color:#1a3a5c;cursor:pointer;font-weight:600">📷 Photo<input type="file" name="photo" accept="image/*" style="display:none"></label>
        </div>
        <div style="flex:1">
            <div class="form-row"><div class="form-group"><label>Prénom *</label><input type="text" name="first_name" required></div><div class="form-group"><label>Nom *</label><input type="text" name="last_name" required></div></div>
            <div class="form-row"><div class="form-group"><label>Matricule</label><input type="text" name="matricule" placeholder="EMP-001"></div><div class="form-group"><label>Code RH</label><input type="text" name="code_rh" placeholder="RH-001"></div></div>
        </div>
    </div>
    <div class="form-row"><div class="form-group"><label>Email</label><input type="email" name="email"></div><div class="form-group"><label>Téléphone</label><input type="text" name="tel"></div></div>
    <div class="form-row"><div class="form-group"><label>Date de naissance</label><input type="date" name="birth_date"></div><div class="form-group"><label>Sexe</label><select name="gender"><option value="">—</option><option value="M">Masculin</option><option value="F">Féminin</option></select></div></div>
    <div class="form-row"><div class="form-group"><label>Poste</label><input type="text" name="position" placeholder="Ex: Technicien réseau"></div><div class="form-group"><label>Département</label><input type="text" name="department"></div></div>
    <div class="form-row"><div class="form-group"><label>Date d'embauche</label><input type="date" name="hire_date"></div><div class="form-group"><label>Type de contrat</label><select name="contract_type"><option value="CDI">CDI</option><option value="CDD">CDD</option><option value="Stage">Stage</option><option value="Freelance">Freelance</option></select></div></div>
    <div class="form-row"><div class="form-group"><label>Salaire brut (FCFA)</label><input type="number" name="salary" step="1" value="0"></div><div class="form-group"><label>Groupe sanguin</label><select name="blood_type"><option value="">—</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div></div>
    <div class="form-row"><div class="form-group"><label>Assurance</label><input type="text" name="insurance" placeholder="Ex: MUGEFCI"></div><div class="form-group"><label>N° Assurance</label><input type="text" name="insurance_number"></div></div>
    <div class="form-row"><div class="form-group"><label>Contact urgence</label><input type="text" name="emergency_contact"></div><div class="form-group"><label>Tél urgence</label><input type="text" name="emergency_tel"></div></div>
    <div class="form-group"><label>📎 Documents joints (CV, contrat, diplômes...)</label><input type="file" name="files" multiple style="padding:8px;border:1.5px dashed #ccc;border-radius:8px;width:100%"></div>
    <div style="display:flex;gap:10px;margin-top:16px"><a href="/rh/personnel" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary" style="flex:1">✅ Enregistrer</button></div>
</form></div></div>
{% endblock %}
