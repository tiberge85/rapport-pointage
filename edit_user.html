{% extends "base.html" %}
{% block title %}RAMYA - Modifier utilisateur{% endblock %}
{% block content %}
<div class="page-header">
    <h1>✏️ Modifier l'utilisateur</h1>
    <p>{{ edit_user.full_name }} ({{ edit_user.username }})</p>
</div>
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            <div class="form-group"><label>Nom complet</label><input type="text" name="full_name" value="{{ edit_user.full_name }}" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ edit_user.email }}" required></div>
            <div class="form-group"><label>Rôle</label>
                <select name="role">
                    {% for r in ['technicien','rh','admin'] %}<option value="{{ r }}" {% if edit_user.role == r %}selected{% endif %}>{{ r }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Nouveau mot de passe (laisser vide pour ne pas changer)</label><input type="password" name="password" minlength="6"></div>
            <div style="display:flex;gap:10px"><a href="/admin" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary">💾 Sauvegarder</button></div>
        </form>
    </div>
</div>
{% endblock %}
