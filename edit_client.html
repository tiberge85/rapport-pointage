{% extends "base.html" %}
{% block title %}RAMYA - Modifier client{% endblock %}
{% block content %}
<div class="page-header"><h1>✏️ Modifier le client</h1></div>
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            <div class="form-group"><label>Nom *</label><input type="text" name="name" value="{{ client.name }}" required></div>
            <div class="form-row">
                <div class="form-group"><label>Contact</label><input type="text" name="contact_name" value="{{ client.contact_name or '' }}"></div>
                <div class="form-group"><label>Tél</label><input type="text" name="tel" value="{{ client.tel or '' }}"></div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ client.email or '' }}"></div>
            <div class="form-group"><label>Adresse</label><input type="text" name="address" value="{{ client.address or '' }}"></div>
            <div class="form-group"><label>Notes</label><textarea name="notes" rows="2" style="width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px">{{ client.notes or '' }}</textarea></div>
            <div style="display:flex;gap:10px"><a href="/clients" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary">💾 Sauvegarder</button></div>
        </form>
    </div>
</div>
{% endblock %}
