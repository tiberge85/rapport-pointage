{% extends "base.html" %}
{% block title %}WannyGest - Modifier employé{% endblock %}
{% block content %}
<div class="page-header"><h1>✏️ {{ emp.first_name }} {{ emp.last_name }}</h1></div>
<div class="card" style="max-width:700px"><div class="card-body"><form method="post">
    <div class="form-row"><div class="form-group"><label>Prénom</label><input type="text" name="first_name" value="{{ emp.first_name }}" required></div><div class="form-group"><label>Nom</label><input type="text" name="last_name" value="{{ emp.last_name }}" required></div></div>
    <div class="form-row"><div class="form-group"><label>Matricule</label><input type="text" name="matricule" value="{{ emp.matricule or '' }}"></div><div class="form-group"><label>Email</label><input type="email" name="email" value="{{ emp.email or '' }}"></div></div>
    <div class="form-row"><div class="form-group"><label>Tél</label><input type="text" name="tel" value="{{ emp.tel or '' }}"></div><div class="form-group"><label>Poste</label><input type="text" name="position" value="{{ emp.position or '' }}"></div></div>
    <div class="form-row"><div class="form-group"><label>Département</label><input type="text" name="department" value="{{ emp.department or '' }}"></div><div class="form-group"><label>Embauche</label><input type="date" name="hire_date" value="{{ emp.hire_date or '' }}"></div></div>
    <div class="form-row"><div class="form-group"><label>Contrat</label><select name="contract_type">{% for t in ['CDI','CDD','Stage','Freelance'] %}<option value="{{ t }}" {% if emp.contract_type==t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div><div class="form-group"><label>Salaire</label><input type="number" name="salary" step="1" value="{{ emp.salary or 0 }}"></div></div>
    <div class="form-row"><div class="form-group"><label>Assurance</label><input type="text" name="insurance" value="{{ emp.insurance or '' }}"></div><div class="form-group"><label>N° Assurance</label><input type="text" name="insurance_number" value="{{ emp.insurance_number or '' }}"></div></div>
    <div class="form-group"><label>Statut</label><select name="status"><option value="actif" {% if emp.status=='actif' %}selected{% endif %}>Actif</option><option value="inactif" {% if emp.status=='inactif' %}selected{% endif %}>Inactif</option><option value="suspendu" {% if emp.status=='suspendu' %}selected{% endif %}>Suspendu</option></select></div>
    <div style="display:flex;gap:10px;margin-top:16px"><a href="/rh/personnel" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary">💾 Sauvegarder</button></div>
</form></div></div>
{% endblock %}
