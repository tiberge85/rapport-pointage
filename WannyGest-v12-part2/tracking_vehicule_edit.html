{% extends "base.html" %}{% block title %}WannyGest - Modifier véhicule{% endblock %}{% block content %}
<div class="page-header"><h1>✏️ Modifier — {{ vehicle.immatriculation }}</h1><a href="/tracking/vehicules" class="btn btn-outline btn-sm">← Retour</a></div>
<div class="card" style="max-width:700px"><div class="card-body"><form method="post">
    <h4 style="font-size:12px;color:#1a7a6d;margin:0 0 8px;border-bottom:1px solid #eee;padding-bottom:4px">Véhicule</h4>
    <div class="rg" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="form-group"><label>Immatriculation</label><input type="text" name="immatriculation" value="{{ vehicle.immatriculation }}" required></div>
        <div class="form-group"><label>Marque</label><input type="text" name="marque" value="{{ vehicle.marque or '' }}"></div>
        <div class="form-group"><label>Modèle</label><input type="text" name="modele" value="{{ vehicle.modele or '' }}"></div>
    </div>
    <div class="rg" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="form-group"><label>Type</label><select name="type">{% for t in ['voiture','camion','moto','engin','bus'] %}<option {% if vehicle.type==t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div>
        <div class="form-group"><label>Couleur</label><input type="text" name="couleur" value="{{ vehicle.couleur or '' }}"></div>
        <div class="form-group"><label>Année</label><input type="text" name="annee" value="{{ vehicle.annee or '' }}"></div>
    </div>
    <div class="rg" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group"><label>Propriétaire</label><input type="text" name="proprietaire" value="{{ vehicle.proprietaire or '' }}"></div>
        <div class="form-group"><label>Tél</label><input type="text" name="tel_proprietaire" value="{{ vehicle.tel_proprietaire or '' }}"></div>
    </div>
    <h4 style="font-size:12px;color:#1a7a6d;margin:14px 0 6px;border-bottom:1px solid #eee;padding-bottom:4px">📡 Balise GPS</h4>
    <div class="rg" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="form-group"><label>Marque</label><select name="gps_brand">{% for b in ['Concox','Coban','Queclink','Teltonika','Autre'] %}<option {% if vehicle.gps_brand==b %}selected{% endif %}>{{ b }}</option>{% endfor %}</select></div>
        <div class="form-group"><label>Modèle</label><input type="text" name="gps_model" value="{{ vehicle.gps_model or '' }}"></div>
        <div class="form-group"><label>Device ID</label><input type="text" name="gps_device_id" value="{{ vehicle.gps_device_id or '' }}"></div>
    </div>
    <div class="rg" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group"><label>SIM</label><input type="text" name="gps_sim" value="{{ vehicle.gps_sim or '' }}"></div>
        <div class="form-group"><label>IMEI</label><input type="text" name="gps_imei" value="{{ vehicle.gps_imei or '' }}"></div>
    </div>
    <div class="rg" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="form-group"><label>Date installation</label><input type="date" name="installation_date" value="{{ vehicle.installation_date or '' }}"></div>
        <div class="form-group"><label>Technicien</label><input type="text" name="installation_tech" value="{{ vehicle.installation_tech or '' }}"></div>
        <div class="form-group"><label>Statut</label><select name="status">{% for s in ['actif','inactif','maintenance'] %}<option {% if vehicle.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea name="notes" rows="2" style="width:100%;padding:8px;border:1.5px solid #ddd;border-radius:7px;font-size:12px">{{ vehicle.notes or '' }}</textarea></div>
    <div style="display:flex;gap:8px;margin-top:12px"><a href="/tracking/vehicules" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary" style="flex:1">💾 Sauvegarder</button></div>
</form></div></div>
{% endblock %}
