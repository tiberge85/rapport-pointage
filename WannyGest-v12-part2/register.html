{% extends "base.html" %}{% block title %}WannyGest - Créer un utilisateur{% endblock %}{% block content %}
<div class="page-header"><h1>👤 Créer un utilisateur</h1></div>

<div class="card" style="max-width:550px">
<div class="card-header"><h3>Nouveau compte utilisateur</h3></div>
<div class="card-body">
    <form method="post" action="/register">
        <div class="form-group">
            <label>Nom complet *</label>
            <input type="text" name="full_name" required placeholder="Ex: HAMIEN Yanick">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Nom d'utilisateur *</label>
                <input type="text" name="username" required placeholder="Ex: yanick">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required placeholder="Ex: yanick@ramya.ci">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Mot de passe *</label>
                <input type="password" name="password" required minlength="6" placeholder="Min. 6 caractères">
            </div>
            <div class="form-group">
                <label>Confirmer *</label>
                <input type="password" name="password2" required placeholder="Répétez">
            </div>
        </div>
        <div class="form-group">
            <label>Rôle *</label>
            <select name="role" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px">
                <option value="technicien">Technicien</option>
                <option value="commercial">Commercial</option>
                <option value="comptable">Comptable</option>
                <option value="rh">Ressources Humaines</option>
                <option value="informatique">Informatique</option>
                <option value="dg">Directeur Général</option>
                <option value="admin">Administrateur</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
            <a href="/admin" class="btn btn-outline" style="flex:1;text-align:center;padding:12px">Annuler</a>
            <button type="submit" class="btn btn-primary" style="flex:2;padding:12px">👤 Créer le compte</button>
        </div>
    </form>
</div>
</div>
{% endblock %}
