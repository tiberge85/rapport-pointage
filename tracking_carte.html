{% extends "base.html" %}{% block title %}WannyGest - Carte GPS{% endblock %}{% block content %}
<div class="page-header"><h1>🗺️ Carte en temps réel</h1>
<span style="font-size:12px;color:#888">{{ vehicles|length }} véhicules actifs</span></div>

<div class="card"><div class="card-body" style="padding:0">
<div id="map" style="height:550px;border-radius:12px"></div>
</div></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([5.35, -4.0], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'OpenStreetMap'}).addTo(map);
var markers = [];
{% for v in vehicles %}
{% if v.last_lat and v.last_lng %}
var m = L.marker([{{ v.last_lat }}, {{ v.last_lng }}]).addTo(map)
    .bindPopup('<b>{{ v.immatriculation }}</b><br>{{ v.marque }} {{ v.modele }}<br>{{ v.proprietaire or "" }}<br><b>{{ "%.0f"|format(v.last_speed or 0) }} km/h</b><br><small>{{ v.last_update or "" }}</small><br><a href="/tracking/vehicules/view/{{ v.id }}">Voir détails →</a>');
markers.push(m);
{% endif %}
{% endfor %}
if (markers.length > 0) {
    var group = new L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
}
</script>
{% endblock %}
